<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="token.css">
  <link rel="stylesheet" href="style.css">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <script type="module" src="script.js"></script>
  <script type="module" src="assignee/modal.js"></script>
  <script type="module" src="assignee/render.js"></script>
</head>

<body>
  <header class="header">
    <h1 class="header__title">OPD <em>Schedule</em></h1>
    <div class="header__controls">
      <div class="header__select-wrap">
        <select id="month-select" class="header__select"></select>
      </div>
      <div class="header__select-wrap">
        <select id="year-select" class="header__select"></select>
      </div>
      <button class="header__btn-today" id="btn-today">Today</button>
      <button class="header__btn-today" id="btn-add-assignee">Add Assignee</button>
    </div>
    <section id="assignee-list" class="assignees"></section>
  </header>

  <main class="main-content">
    <div id="calendar-wrap" class="calendar"></div>
  </main>

  <dialog class="modal" id="assignee-modal">
    <form class="modal__form" id="assignee-form">
      <h2 class="modal__title">Add Assignee</h2>
      <div class="modal__field">
        <label for="assignee-name" class="modal__label">Name</label>
        <input type="text" id="assignee-name" name="name" class="modal__input" placeholder="Enter assignee name"
          required>
      </div>
      <div class="modal__actions">
        <button type="button" class="header__btn-secondary" id="btn-close-modal">Cancel</button>
        <button type="submit" class="header__btn-today">Submit</button>
      </div>
    </form>
  </dialog>

  <dialog class="modal" id="delete-confirm-modal">
    <div class="modal__form">
      <h2 class="modal__title">Delete Assignee</h2>
      <p style="margin-bottom: 24px; font-size: 14px; color: var(--ink);">Are you sure you want to delete <strong
          id="delete-assignee-name"></strong>?</p>
      <div class="modal__actions">
        <button type="button" class="header__btn-secondary" id="btn-cancel-delete">Cancel</button>
        <button type="button" class="header__btn-today" id="btn-confirm-delete"
          style="background: #e63946; color: white;">Delete</button>
      </div>
    </div>
  </dialog>
</body>

</html>
